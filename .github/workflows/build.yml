name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    - name: Restore
      run: dotnet restore FlankSpeedLegacyDemo.Web/FlankSpeedLegacyDemo.Web.csproj
    - name: Build
      run: dotnet build FlankSpeedLegacyDemo.Web/FlankSpeedLegacyDemo.Web.csproj --no-restore
    - name: Test
      run: echo "No tests yet — placeholder for demo"
